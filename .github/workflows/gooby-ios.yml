name: Gooby iOS

on:
  push:
    branches:
      - "**"
    tags:
      - "gooby-v*"
    paths:
      - "GOOBY/**"
      - ".github/workflows/gooby-ios.yml"
      - ".github/workflows/gooby-web-ci.yml"
  pull_request:
    paths:
      - "GOOBY/**"
      - ".github/workflows/gooby-ios.yml"
      - ".github/workflows/gooby-web-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gooby-ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Check optional signing gates
    runs-on: macos-15
    outputs:
      signed_ready: ${{ steps.gates.outputs.signed_ready }}
      testflight_ready: ${{ steps.gates.outputs.testflight_ready }}
    steps:
      - name: Evaluate secret availability
        id: gates
        shell: bash
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          signed_ready=false
          testflight_ready=false
          if [[ -n "$IOS_CERT_P12_BASE64" && -n "$IOS_CERT_PASSWORD" && -n "$IOS_PROVISIONING_PROFILE_BASE64" && -n "$APPLE_TEAM_ID" ]]; then
            signed_ready=true
          fi
          if [[ "$signed_ready" == true && -n "$ASC_API_KEY_ID" && -n "$ASC_API_ISSUER_ID" && -n "$ASC_API_KEY_P8_BASE64" ]]; then
            testflight_ready=true
          fi
          printf 'signed_ready=%s\n' "$signed_ready" >> "$GITHUB_OUTPUT"
          printf 'testflight_ready=%s\n' "$testflight_ready" >> "$GITHUB_OUTPUT"

  unsigned:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: GOOBY
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use repository Node version
        uses: actions/setup-node@v4
        with:
          node-version-file: GOOBY/.nvmrc
          cache: npm
          cache-dependency-path: GOOBY/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Build web app
        run: npm run build
      - name: Sync Capacitor iOS project
        run: npx cap sync ios
      - name: Install CocoaPods
        run: pod install
        working-directory: GOOBY/ios/App
      - name: Archive without code signing
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Gooby-unsigned.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO
      - name: Package unsigned IPA
        run: |
          test -d "$RUNNER_TEMP/Gooby-unsigned.xcarchive/Products/Applications/App.app"
          rm -rf "$RUNNER_TEMP/Payload"
          mkdir -p "$RUNNER_TEMP/Payload"
          ditto "$RUNNER_TEMP/Gooby-unsigned.xcarchive/Products/Applications/App.app" "$RUNNER_TEMP/Payload/App.app"
          cd "$RUNNER_TEMP"
          ditto -c -k --sequesterRsrc --keepParent Payload Gooby-unsigned.ipa
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Gooby-unsigned-ipa
          path: ${{ runner.temp }}/Gooby-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
      - name: Explain unsigned artifact
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ## Gooby unsigned IPA
          `Gooby-unsigned.ipa` is an unsigned CI build. It requires re-signing with a valid Apple certificate and provisioning profile before installation or distribution, and it cannot be uploaded to TestFlight as-is.
          SUMMARY

  signed:
    name: Build optionally signed IPA
    needs: preflight
    if: needs.preflight.outputs.signed_ready == 'true' && github.event_name != 'pull_request'
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: GOOBY
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use repository Node version
        uses: actions/setup-node@v4
        with:
          node-version-file: GOOBY/.nvmrc
          cache: npm
          cache-dependency-path: GOOBY/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Build web app
        run: npm run build
      - name: Sync Capacitor iOS project
        run: npx cap sync ios
      - name: Install CocoaPods
        run: pod install
        working-directory: GOOBY/ios/App
      - name: Import signing assets and archive
        shell: bash
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/gooby-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERTIFICATE="$RUNNER_TEMP/gooby-certificate.p12"
          PROFILE="$RUNNER_TEMP/gooby-profile.mobileprovision"
          printf '%s' "$IOS_CERT_P12_BASE64" | /usr/bin/base64 -D > "$CERTIFICATE"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | /usr/bin/base64 -D > "$PROFILE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -k "$KEYCHAIN" -P "$IOS_CERT_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN"
          PROFILE_PLIST="$RUNNER_TEMP/gooby-profile.plist"
          security cms -D -i "$PROFILE" > "$PROFILE_PLIST"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"
          PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST")"
          PROFILE_TEAM_ID="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.team-identifier' "$PROFILE_PLIST")"
          [[ "$PROFILE_APP_ID" == "$APPLE_TEAM_ID.com.gooby.pet" ]]
          [[ "$PROFILE_TEAM_ID" == "$APPLE_TEAM_ID" ]]
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "$PROFILE_UUID" > "$RUNNER_TEMP/gooby-profile-uuid"
          cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk '/[0-9A-F]{40}/ { print $2; exit }')"
          test -n "$SIGNING_IDENTITY"
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Gooby-signed.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN" \
            COMPILER_INDEX_STORE_ENABLE=NO
          test -d "$RUNNER_TEMP/Gooby-signed.xcarchive/Products/Applications/App.app"
          rm -rf "$RUNNER_TEMP/Payload"
          mkdir -p "$RUNNER_TEMP/Payload"
          ditto "$RUNNER_TEMP/Gooby-signed.xcarchive/Products/Applications/App.app" "$RUNNER_TEMP/Payload/App.app"
          cd "$RUNNER_TEMP"
          ditto -c -k --sequesterRsrc --keepParent Payload Gooby-signed.ipa
      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: Gooby-signed-ipa
          path: ${{ runner.temp }}/Gooby-signed.ipa
          if-no-files-found: error
          retention-days: 14
      - name: Clean signing material
        if: always()
        shell: bash
        run: |
          if [[ -f "$RUNNER_TEMP/gooby-profile-uuid" ]]; then
            PROFILE_UUID="$(<"$RUNNER_TEMP/gooby-profile-uuid")"
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          fi
          security delete-keychain "$RUNNER_TEMP/gooby-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/gooby-certificate.p12" "$RUNNER_TEMP/gooby-profile.mobileprovision" "$RUNNER_TEMP/gooby-profile.plist" "$RUNNER_TEMP/gooby-profile-uuid"

  testflight:
    name: Upload tagged release to TestFlight
    needs: preflight
    if: startsWith(github.ref, 'refs/tags/gooby-v') && needs.preflight.outputs.testflight_ready == 'true' && github.event_name == 'push'
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: GOOBY
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use repository Node version
        uses: actions/setup-node@v4
        with:
          node-version-file: GOOBY/.nvmrc
          cache: npm
          cache-dependency-path: GOOBY/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Build web app
        run: npm run build
      - name: Sync Capacitor iOS project
        run: npx cap sync ios
      - name: Install CocoaPods
        run: pod install
        working-directory: GOOBY/ios/App
      - name: Sign and export App Store IPA
        shell: bash
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/gooby-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERTIFICATE="$RUNNER_TEMP/gooby-certificate.p12"
          PROFILE="$RUNNER_TEMP/gooby-profile.mobileprovision"
          printf '%s' "$IOS_CERT_P12_BASE64" | /usr/bin/base64 -D > "$CERTIFICATE"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | /usr/bin/base64 -D > "$PROFILE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -k "$KEYCHAIN" -P "$IOS_CERT_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN"
          PROFILE_PLIST="$RUNNER_TEMP/gooby-profile.plist"
          security cms -D -i "$PROFILE" > "$PROFILE_PLIST"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"
          PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST")"
          PROFILE_TEAM_ID="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.team-identifier' "$PROFILE_PLIST")"
          [[ "$PROFILE_APP_ID" == "$APPLE_TEAM_ID.com.gooby.pet" ]]
          [[ "$PROFILE_TEAM_ID" == "$APPLE_TEAM_ID" ]]
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "$PROFILE_UUID" > "$RUNNER_TEMP/gooby-profile-uuid"
          cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk '/[0-9A-F]{40}/ { print $2; exit }')"
          test -n "$SIGNING_IDENTITY"
          MARKETING_VERSION="${GITHUB_REF_NAME#gooby-v}"
          [[ "$MARKETING_VERSION" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Gooby-testflight.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN" \
            COMPILER_INDEX_STORE_ENABLE=NO
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EXPORT_OPTIONS
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.gooby.pet</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EXPORT_OPTIONS
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Gooby-testflight.xcarchive" \
            -exportPath "$RUNNER_TEMP/Gooby-testflight-export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN"
          IPA_FILES=("$RUNNER_TEMP/Gooby-testflight-export"/*.ipa)
          test "${#IPA_FILES[@]}" -eq 1
          mv "${IPA_FILES[0]}" "$RUNNER_TEMP/Gooby-TestFlight.ipa"
      - name: Upload to TestFlight
        shell: bash
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_$ASC_API_KEY_ID.p8"
          printf '%s' "$KEY_PATH" > "$RUNNER_TEMP/gooby-asc-key-path"
          printf '%s' "$ASC_API_KEY_P8_BASE64" | /usr/bin/base64 -D > "$KEY_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/Gooby-TestFlight.ipa" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"
      - name: Clean signing and App Store Connect material
        if: always()
        shell: bash
        run: |
          if [[ -f "$RUNNER_TEMP/gooby-profile-uuid" ]]; then
            PROFILE_UUID="$(<"$RUNNER_TEMP/gooby-profile-uuid")"
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          fi
          if [[ -f "$RUNNER_TEMP/gooby-asc-key-path" ]]; then
            ASC_KEY_PATH="$(<"$RUNNER_TEMP/gooby-asc-key-path")"
            rm -f "$ASC_KEY_PATH"
          fi
          security delete-keychain "$RUNNER_TEMP/gooby-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/gooby-certificate.p12" "$RUNNER_TEMP/gooby-profile.mobileprovision" "$RUNNER_TEMP/gooby-profile.plist" "$RUNNER_TEMP/gooby-profile-uuid" "$RUNNER_TEMP/gooby-asc-key-path" "$RUNNER_TEMP/ExportOptions.plist"
