name: Gooby iOS

on:
  push:
    branches:
      - "**"
    tags:
      - "gooby-v*"
    paths:
      - "GOOBY/**"
      - ".github/workflows/gooby-ios.yml"
      - ".github/workflows/gooby-web-ci.yml"
  pull_request:
    paths:
      - "GOOBY/**"
      - ".github/workflows/gooby-ios.yml"
      - ".github/workflows/gooby-web-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gooby-ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate native inputs and unsigned workflow
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: GOOBY
    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Use repository Node version
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: GOOBY/.nvmrc
          cache: npm
          cache-dependency-path: GOOBY/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Check diff and whitespace hygiene
        run: npm run ci:diff-check
      - name: Audit offline assets
        run: npm run assets:audit
      - name: Scan runtime for network access
        run: npm run audit:no-network
      - name: Check native project inputs
        run: npm run ci:native-check
      - name: Install pinned actionlint
        shell: bash
        env:
          ACTIONLINT_VERSION: 1.7.7
          ACTIONLINT_SHA256: 023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error --retry 3 \
            --output "$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$archive" | sha256sum --check --status
          mkdir -p "$RUNNER_TEMP/actionlint-bin"
          tar -xzf "$archive" -C "$RUNNER_TEMP/actionlint-bin" actionlint
          test -x "$RUNNER_TEMP/actionlint-bin/actionlint"
          echo "$RUNNER_TEMP/actionlint-bin" >> "$GITHUB_PATH"
      - name: Check Gooby workflow structure
        run: |
          command -v actionlint >/dev/null
          npm run ci:workflow-check

  unsigned:
    name: Build unsigned IPA
    needs: preflight
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: GOOBY
    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Use repository Node version
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: GOOBY/.nvmrc
          cache: npm
          cache-dependency-path: GOOBY/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Audit offline assets before archive
        run: npm run assets:audit
      - name: Scan runtime for network access before archive
        run: npm run audit:no-network
      - name: Build web app
        run: npm run build
      - name: Sync Capacitor iOS project
        run: npx cap sync ios
      - name: Install CocoaPods
        run: pod install
        working-directory: GOOBY/ios/App
      - name: Archive without code signing
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Gooby-unsigned.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO
      - name: Package unsigned IPA
        run: |
          test -d "$RUNNER_TEMP/Gooby-unsigned.xcarchive/Products/Applications/App.app"
          rm -rf "$RUNNER_TEMP/Payload"
          mkdir -p "$RUNNER_TEMP/Payload"
          ditto "$RUNNER_TEMP/Gooby-unsigned.xcarchive/Products/Applications/App.app" "$RUNNER_TEMP/Payload/App.app"
          cd "$RUNNER_TEMP"
          ditto -c -k --sequesterRsrc --keepParent Payload Gooby-unsigned.ipa
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@615b319bd27bb32c3d64dca6b6ed6974d5fbe653 # v6.0.0
        with:
          name: Gooby-unsigned-ipa
          path: ${{ runner.temp }}/Gooby-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
      - name: Explain unsigned artifact
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ## Gooby unsigned IPA
          `Gooby-unsigned.ipa` is an unsigned CI build. It requires re-signing with a valid Apple certificate and provisioning profile before installation or distribution, and it cannot be uploaded to TestFlight as-is.
          Optional signed distribution jobs must only be added after maintainers configure a protected GitHub environment outside this repository.
          SUMMARY
