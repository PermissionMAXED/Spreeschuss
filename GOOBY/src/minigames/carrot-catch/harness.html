<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Minigame Module Harness</title>
    <style>
      html,body,#game{width:100%;height:100%;margin:0;overflow:hidden;background:#28242b}
      #game{width:min(100%,520px);margin:auto}
    </style>
  </head>
  <body>
    <main id="game"></main>
    <script type="module">
      import { FakeClock } from "../../core/contracts/clock.ts";
      import { SeededRng } from "../../core/contracts/rng.ts";
      import { createMinigameLifecycle } from "../../core/contracts/minigame.ts";
      import { definition as carrotCatch } from "./index.ts";
      import { definition as bunnyHop } from "../bunny-hop/index.ts";
      import { definition as pancakePeak } from "../pancake-peak/index.ts";

      const definitions = {
        "carrot-catch": carrotCatch,
        "bunny-hop": bunnyHop,
        "pancake-peak": pancakePeak,
      };
      const params = new URLSearchParams(location.search);
      const id = params.get("game") ?? "carrot-catch";
      const definition = definitions[id] ?? carrotCatch;
      const seed = Number(params.get("seed") ?? 0x600b1e);
      const initialBest = Number(params.get("best") ?? 0);
      const reducedMotion = params.get("reducedMotion") === "1";
      const mount = document.querySelector("#game");
      const clock = new FakeClock(1_700_000_000_000);

      const settlements = new Map();
      const bestScores = new Map([[definition.id, initialBest]]);
      const feedbackEvents = [];
      const audioEvents = [];
      const payouts = [];
      const lifecycle = createMinigameLifecycle(
        definition.id,
        clock,
        {
          getBestScore: (gameId) => bestScores.get(gameId) ?? 0,
          getSettlement: (runId) => settlements.get(runId) ?? null,
          settle(receipt) {
            const previous = settlements.get(receipt.runId);
            if (previous) return previous;
            settlements.set(receipt.runId, receipt);
            bestScores.set(receipt.minigameId, receipt.bestScore);
            return receipt;
          },
        },
        { emit: (event) => feedbackEvents.push(event) },
      );

      const module = definition.create();
      let last = performance.now();
      let frame = 0;
      let loopRunning = true;
      const loop = (now) => {
        if (!loopRunning) return;
        const delta = Math.min(0.05, Math.max(0, (now - last) / 1_000));
        last = now;
        clock.advance(delta * 1_000);
        module.update(delta);
        frame = requestAnimationFrame(loop);
      };
      module.mount({
        mount,
        clock,
        rng: new SeededRng(seed),
        lifecycle,
        audio: { emit: (action, value) => audioEvents.push([action, value]) },
        reducedMotion,
        finish: (payout) => {
          payouts.push(payout);
        },
      });
      module.start();
      frame = requestAnimationFrame(loop);
      window.__minigameHarness = {
        id,
        module,
        clock,
        lifecycle,
        settlements,
        feedbackEvents,
        audioEvents,
        payouts,
        advance(seconds) {
          let remaining = seconds;
          while (remaining > 0.000_001) {
            const step = Math.min(0.05, remaining);
            remaining -= step;
            clock.advance(step * 1_000);
            module.update(step);
          }
        },
        stopLoop() {
          loopRunning = false;
          cancelAnimationFrame(frame);
        },
        dispose() {
          loopRunning = false;
          cancelAnimationFrame(frame);
          module.dispose();
        },
      };
      mount.dataset.ready = "true";
    </script>
  </body>
</html>
