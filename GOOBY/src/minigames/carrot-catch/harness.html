<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Minigame Module Harness</title>
    <style>
      html,body,#game{width:100%;height:100%;margin:0;overflow:hidden;background:#28242b}
      #game{width:min(100%,520px);margin:auto}
    </style>
  </head>
  <body>
    <main id="game"></main>
    <script type="module">
      import { FakeClock } from "../../core/contracts/clock.ts";
      import { SeededRng } from "../../core/contracts/rng.ts";
      import { definition as carrotCatch } from "./index.ts";
      import { definition as bunnyHop } from "../bunny-hop/index.ts";
      import { definition as pancakePeak } from "../pancake-peak/index.ts";

      const definitions = {
        "carrot-catch": carrotCatch,
        "bunny-hop": bunnyHop,
        "pancake-peak": pancakePeak,
      };
      const id = new URLSearchParams(location.search).get("game") ?? "carrot-catch";
      const definition = definitions[id] ?? carrotCatch;
      const mount = document.querySelector("#game");
      const clock = new FakeClock(1_700_000_000_000);
      const module = definition.create();
      let last = performance.now();
      let frame = 0;
      const loop = (now) => {
        const delta = Math.min(0.05, Math.max(0, (now - last) / 1_000));
        last = now;
        clock.advance(delta * 1_000);
        module.update(delta);
        frame = requestAnimationFrame(loop);
      };
      module.mount({
        mount,
        clock,
        rng: new SeededRng(0x600b1e),
        finish: (payout) => {
          mount.dataset.finished = "true";
          mount.dataset.payout = JSON.stringify(payout);
        },
      });
      module.start();
      frame = requestAnimationFrame(loop);
      window.__minigameHarness = {
        id,
        module,
        clock,
        advance(seconds) {
          clock.advance(seconds * 1_000);
          module.update(seconds);
        },
        dispose() {
          cancelAnimationFrame(frame);
          module.dispose();
        },
      };
      mount.dataset.ready = "true";
    </script>
  </body>
</html>
