<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>Gooby City Drive Harness</title>
    <style>
      html, body, #city-harness { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #9bd4e3; }
      body { display: grid; place-items: center; font-family: system-ui, sans-serif; }
      #city-harness { position: relative; width: min(100vw, 480px); box-shadow: 0 0 40px #4568; }
      #city-canvas { display: block; width: 100%; height: 100%; touch-action: none; }
      #harness-status {
        position: absolute; left: 50%; bottom: 3%; translate: -50% 0; z-index: 40;
        max-width: 80%; padding: .45rem .8rem; border-radius: 999px; color: white;
        background: #493b49cc; font: 700 .72rem/1.2 system-ui, sans-serif; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main id="city-harness" aria-label="Gooby City development harness">
      <canvas id="city-canvas"></canvas>
      <output id="harness-status">Loading procedural city…</output>
    </main>
    <script type="module" src="./dev-harness.ts"></script>
  </body>
</html>
